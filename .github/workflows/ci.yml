name: eComBot CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ --select E,F,W --ignore E501,W291,W293

  # ── Job 2: Unit tests ──────────────────────────────────────────────────────
  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      SESSION_BACKEND: memory
      VECTOR_BACKEND: memory

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short \
            --ignore=tests/test_support_agent_manual.md \
            --ignore=tests/test_prompt_variants.md \
            --ignore=tests/test_rag_manual.md \
            --ignore=tests/test_routing_manual.md \
            --ignore=tests/test_mcp_manual.md \
            --ignore=tests/test_multiagent_manual.md \
            --ignore=tests/test_guardrails_manual.md \
            -q || true  # allow no tests found

  # ── Job 3: PromptFoo eval ──────────────────────────────────────────────────
  eval:
    name: PromptFoo evaluation
    runs-on: ubuntu-latest
    needs: test
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run PromptFoo eval
        run: |
          npx --yes promptfoo eval \
            --config evals/promptfoo.yaml \
            --no-cache \
            --output evals/results.json \
            --max-concurrency 2 || true  # non-blocking; report is uploaded

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: promptfoo-results
          path: evals/results.json

  # ── Job 4: Build check ────────────────────────────────────────────────────
  build:
    name: Import smoke test
    runs-on: ubuntu-latest
    needs: lint
    env:
      OPENROUTER_API_KEY: placeholder
      SESSION_BACKEND: memory
      VECTOR_BACKEND: memory

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test imports
        run: |
          PYTHONPATH=src python -c "
          import sys
          sys.path.insert(0, 'src')
          from config.settings import settings
          from routing import FAST_MODEL, DEEP_MODEL, classify_query
          from guardrails import injection_guardrail, output_pii_guardrail, tool_safety_guardrail
          from reasoning import TurnResult, ReasoningStep
          from tracing import trace_turn
          print('All imports OK')
          "
